<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>С Днём Рождения!</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Caveat:wght@600&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{width:100vw;height:100vh;overflow:hidden;background:#030d1a;display:flex;align-items:center;justify-content:center;}
#bg-cv{position:fixed;inset:0;z-index:0;}
/* window curtains */
#curtain-l,#curtain-r{position:fixed;top:0;bottom:0;width:min(130px,16vw);z-index:6;pointer-events:none;}
#curtain-l{left:0;background:linear-gradient(to right,rgba(30,10,50,.95) 0%,rgba(60,20,80,.7) 60%,transparent 100%);}
#curtain-r{right:0;background:linear-gradient(to left,rgba(30,10,50,.95) 0%,rgba(60,20,80,.7) 60%,transparent 100%);}
#curtain-l::before,#curtain-r::before{content:'';position:absolute;top:0;bottom:0;width:18px;background:rgba(90,40,110,.6);}
#curtain-l::before{right:0;border-right:3px solid rgba(150,80,180,.3);}
#curtain-r::before{left:0;border-left:3px solid rgba(150,80,180,.3);}
/* curtain folds */
#curtain-l::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(to bottom,transparent 0px,transparent 40px,rgba(0,0,0,.12) 44px,transparent 48px);}
#curtain-r::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(to bottom,transparent 0px,transparent 40px,rgba(0,0,0,.12) 44px,transparent 48px);}
#ov{position:fixed;inset:0;z-index:1;background:rgba(2,8,20,.45);}
#fw-cv{position:fixed;inset:0;z-index:150;pointer-events:none;}

/* Snoopy cake popup */
#snp-popup{
  position:fixed;left:50%;bottom:0;
  transform:translateX(-50%) translateY(120%);
  z-index:200;pointer-events:none;
  display:flex;flex-direction:column;align-items:center;gap:10px;
}
#snp-bubble{
  background:#fff;border-radius:20px;
  padding:10px 26px;
  font-family:'Nunito',sans-serif;font-size:clamp(18px,4vw,26px);font-weight:800;
  color:#c0134e;letter-spacing:1px;
  box-shadow:0 4px 24px rgba(0,0,0,.25);
  position:relative;white-space:nowrap;
}
#snp-bubble::after{
  content:'';position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);
  border:8px solid transparent;border-top-color:#fff;
}
#snp-pop-img{width:clamp(140px,28vw,220px);filter:drop-shadow(0 8px 24px rgba(0,0,0,.4));}
@keyframes snp-pop-in{
  0%  {transform:translateX(-50%) translateY(120%);}
  60% {transform:translateX(-50%) translateY(-34%);}
  75% {transform:translateX(-50%) translateY(-28%);}
  85% {transform:translateX(-50%) translateY(-32%);}
  100%{transform:translateX(-50%) translateY(-30%);}
}
@keyframes snp-pop-out{
  0%  {transform:translateX(-50%) translateY(-30%);}
  100%{transform:translateX(-50%) translateY(130%);}
}
#snp-popup.pop-in {animation:snp-pop-in .85s cubic-bezier(.22,.68,0,1.3) forwards;}
#snp-popup.pop-out{animation:snp-pop-out .6s ease-in forwards;}

/* Terminal */
#s-term{position:relative;z-index:10;width:min(560px,94vw);}
.tbox{background:rgba(8,10,24,.93);border:1px solid #252545;border-radius:14px;overflow:hidden;box-shadow:0 0 0 1px rgba(120,80,255,.15),0 0 50px rgba(80,50,220,.3),0 40px 80px rgba(0,0,0,.7);backdrop-filter:blur(12px);}
.tbar{background:linear-gradient(135deg,#161628,#1a1a35);padding:13px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #252545;}
.dot{width:13px;height:13px;border-radius:50%;}
.dot.r{background:#ff5f57;box-shadow:0 0 6px #ff5f57aa;}
.dot.y{background:#febc2e;box-shadow:0 0 6px #febc2eaa;}
.dot.g{background:#28c840;box-shadow:0 0 6px #28c840aa;}
.btitle{flex:1;text-align:center;color:#44446a;font-family:'Share Tech Mono',monospace;font-size:13px;letter-spacing:2px;margin-left:-52px;}
.tbody{padding:26px 28px 30px;min-height:220px;font-family:'Share Tech Mono',monospace;color:#fff;}
.tl{display:flex;align-items:baseline;margin-bottom:4px;opacity:0;transition:opacity .15s;line-height:1.75;}
.tl.vis{opacity:1;}
.tp{color:#7c6fff;margin-right:10px;font-size:14px;white-space:nowrap;text-shadow:0 0 8px #7c6fff88;flex-shrink:0;}
.tt{font-size:14px;color:#ffffff;white-space:pre-wrap;}
.tt.g{color:#39ff84;text-shadow:0 0 8px #39ff8455;}
.tt.y{color:#ffe066;text-shadow:0 0 8px #ffe06655;}
.tt.p{color:#f9a8d4;text-shadow:0 0 8px #f9a8d455;}
.tt.big{font-size:20px;color:#fff;letter-spacing:1px;text-shadow:0 0 20px #a87cff,0 0 40px #7c6fff66;}
.tcur{display:inline-block;width:9px;height:15px;background:#7c6fff;margin-left:2px;vertical-align:middle;animation:blink .75s step-end infinite;box-shadow:0 0 7px #7c6fff;border-radius:1px;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ── Greeting Card ── */
#s-card{
  position:fixed;inset:0;z-index:11;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .8s ease;
}
#s-card.show{opacity:1;pointer-events:all;}

.card-scene{
  perspective:1200px;
  width:min(380px,88vw);
  height:min(520px,80vh);
  cursor:pointer;
}

.card-3d{
  width:100%;height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 1.5s cubic-bezier(.34,1.56,.64,1);
}
.card-3d.open{ transform:rotateY(-180deg) scale(1.04); }

/* Front */
.card-front,.card-back{
  position:absolute;inset:0;
  border-radius:20px;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
}

.card-front{
  background:linear-gradient(160deg,#b8e8ff 0%,#d4f3ff 55%,#e8faff 100%);
  border:none;
  box-shadow:0 0 0 5px #ff6b9d,0 0 0 10px #ffd93d,0 0 0 14px #6bcfff,0 24px 60px rgba(0,0,0,.45);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;overflow:hidden;
}

/* Stars on front */
.card-front::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(circle at 20% 20%,rgba(200,160,255,.15) 0%,transparent 50%),
    radial-gradient(circle at 80% 80%,rgba(100,200,255,.1) 0%,transparent 50%);
}

.card-cover-title{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(20px,5vw,30px);
  font-weight:700;
  letter-spacing:2px;
  text-transform:uppercase;
  color:transparent;
  background:linear-gradient(135deg,#ffe066 0%,#fff 45%,#ffe066 100%);
  -webkit-background-clip:text;background-clip:text;
  text-align:center;line-height:1.5;
  filter:drop-shadow(0 2px 12px rgba(255,200,50,.5));
  position:relative;z-index:1;
  padding:0 16px;
  border-top:1px solid rgba(255,220,80,.3);
  border-bottom:1px solid rgba(255,220,80,.3);
  padding-top:8px;padding-bottom:8px;
}

.card-cover-emoji{
  font-size:clamp(40px,10vw,72px);
  position:relative;z-index:1;
  animation:pulse-em 2s ease-in-out infinite;
}
@keyframes pulse-em{0%,100%{transform:scale(1);}50%{transform:scale(1.12);}}

.card-tap-hint{
  font-family:'Share Tech Mono',monospace;
  font-size:13px;letter-spacing:3px;
  color:rgba(60,40,120,.55);
  text-transform:uppercase;
  position:relative;z-index:1;
  animation:hint-pulse 1.8s ease-in-out infinite;
}
@keyframes hint-pulse{0%,100%{opacity:.4;}50%{opacity:.9;}}

/* Decorative corner flourishes */
.card-front .corner{
  position:absolute;font-size:22px;opacity:.5;
}
.card-front .corner.tl{top:16px;left:16px;}
.card-front .corner.tr{top:16px;right:16px;}
.card-front .corner.bl{bottom:16px;left:16px;}
.card-front .corner.br{bottom:16px;right:16px;}

/* Back (inside of card) */
.card-back{
  background:linear-gradient(180deg,#7ec8e3 0%,#a8dff0 30%,#c8eefc 60%,#e0f5ff 100%);
  transform:rotateY(180deg);
  border:1px solid rgba(100,180,255,.3);
  box-shadow:0 0 60px rgba(100,180,255,.3),0 20px 60px rgba(0,0,0,.6);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:16px 20px 20px;gap:8px;overflow:hidden;
}

.card-back::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 120px 60px at 15% 22%,rgba(255,255,255,.75) 0%,transparent 70%),
    radial-gradient(ellipse 90px 50px at 30% 18%,rgba(255,255,255,.6) 0%,transparent 70%),
    radial-gradient(ellipse 140px 70px at 72% 30%,rgba(255,255,255,.7) 0%,transparent 70%),
    radial-gradient(ellipse 100px 55px at 85% 25%,rgba(255,255,255,.55) 0%,transparent 70%),
    radial-gradient(ellipse 80px 40px at 55% 10%,rgba(255,255,255,.5) 0%,transparent 70%);
}

/* Toy Story character side figures */
.ts-poster-wrap{position:relative;z-index:1;width:100%;border-radius:12px;overflow:hidden;box-shadow:0 4px 20px rgba(0,40,120,.25);}
.ts-poster-img{width:100%;height:160px;object-fit:cover;object-position:center 30%;display:block;}
/* Card front redesign */
.cf-corner{position:absolute;width:30px;height:30px;pointer-events:none;z-index:1;}
.cf-corner.tl{top:14px;left:14px;animation:spin-slow 9s linear infinite;}
.cf-corner.tr{top:14px;right:14px;animation:spin-slow 7s linear infinite reverse;}
.cf-corner.bl{bottom:56px;left:14px;animation:spin-slow 11s linear infinite;}
.cf-corner.br{bottom:56px;right:14px;animation:spin-slow 8s linear infinite reverse;}
.cf-float{position:absolute;pointer-events:none;z-index:1;}
.cf-float.f1{top:22%;left:6%;width:22px;animation:float-em 3.2s ease-in-out infinite;}
.cf-float.f2{top:18%;right:7%;width:20px;animation:float-em 4s ease-in-out infinite .8s;}
.cf-float.f3{top:65%;left:5%;width:18px;animation:float-em 3.6s ease-in-out infinite 1.4s;}
@keyframes spin-slow{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes float-em{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
/* Snoopy photo on card front */
.cf-snp-photo{position:absolute;inset:0;border-radius:24px;overflow:hidden;z-index:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#b8e8ff 0%,#d4f3ff 50%,#e8faff 100%);}
.cf-snp-img{width:92%;height:88%;object-fit:contain;object-position:center bottom;filter:drop-shadow(0 6px 18px rgba(0,0,0,.18));}
.cf-snp-cover{display:none;}
/* Stars on card front */
.ts-stars-bg{position:absolute;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;}
/* Mini Buzz corner on card front */
.ts-buzz-mini{position:absolute;bottom:52px;right:14px;z-index:2;pointer-events:none;}

.card-inside-title{
  font-family:'Caveat',cursive;
  font-size:clamp(26px,6vw,42px);
  font-weight:600;
  color:transparent;
  background:linear-gradient(135deg,#7c3aed,#1a6ec8,#0a4aaa);
  -webkit-background-clip:text;background-clip:text;
  text-align:center;line-height:1.2;
  position:relative;z-index:1;
  opacity:0;transform:translateY(10px);
  transition:opacity .8s .4s, transform .8s .4s;
}
.card-3d.open .card-inside-title{opacity:1;transform:translateY(0);}

.card-divider{
  width:0;height:2px;
  background:linear-gradient(90deg,transparent,#db2777,transparent);
  border-radius:1px;
  transition:width 1s .8s ease;
  position:relative;z-index:1;
}
.card-3d.open .card-divider{width:80%;}

.card-inside-msg{
  font-family:'Caveat',cursive;
  font-size:clamp(16px,3.5vw,22px);
  color:#0a2a5c;
  text-align:center;line-height:1.7;
  position:relative;z-index:1;
  opacity:0;transform:translateY(10px);
  transition:opacity .8s 1s, transform .8s 1s;
}
.card-3d.open .card-inside-msg{opacity:1;transform:translateY(0);}

.card-inside-em{
  font-size:clamp(24px,5vw,36px);
  position:relative;z-index:1;
  opacity:0;transition:opacity .8s 1.4s;
}
.card-3d.open .card-inside-em{opacity:1;}

.card-continue{
  font-family:'Share Tech Mono',monospace;
  font-size:12px;letter-spacing:2px;
  color:rgba(100,40,140,.5);
  text-transform:uppercase;
  position:relative;z-index:1;
  opacity:0;transition:opacity .8s 1.8s;
  animation:hint-pulse 1.8s ease-in-out infinite;
}
.card-3d.open .card-continue{opacity:1;}

/* Cake screen */
#s-cake{position:fixed;top:0;left:0;right:0;bottom:0;width:100%;height:100%;z-index:10;opacity:0;pointer-events:none;transition:opacity .8s ease;overflow:hidden;}
#three-wrap{position:absolute;top:0;left:0;right:0;bottom:0;width:100%;height:100%;z-index:0;}
#three-cv{display:block;width:100%;height:100%;}
#cake-ui{position:absolute;top:0;left:0;right:0;bottom:0;z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:18px;pointer-events:none;gap:0;}
#toy-greeting{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:opacity .3s;}
#toy-greeting.show{opacity:1;pointer-events:all;}
.tg-box{background:linear-gradient(145deg,#1a0a2e,#0d1f3c);border:1px solid rgba(200,150,255,.3);border-radius:20px;padding:24px 28px;display:flex;flex-direction:column;align-items:center;gap:14px;max-width:320px;box-shadow:0 0 60px rgba(150,100,255,.4);}
.tg-box img{height:160px;width:auto;filter:drop-shadow(0 6px 18px rgba(100,150,255,.4));}
#tg-name{font-family:'Caveat',cursive;font-size:32px;color:#fff;font-weight:700;text-shadow:0 0 20px rgba(200,150,255,.8);}
#tg-msg{font-family:'Caveat',cursive;font-size:20px;color:rgba(255,255,255,.9);text-align:center;line-height:1.5;}
.tg-box button{padding:8px 24px;border-radius:30px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;font-size:14px;cursor:pointer;letter-spacing:2px;font-family:'Share Tech Mono',monospace;}

/* Toy Story room background */
#cake-room{position:absolute;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
#cake-wall{
  position:absolute;top:0;left:0;right:0;height:62%;
  background:linear-gradient(180deg,#b8e4f9 0%,#cceeff 60%,#ddf2ff 100%);
}
#cake-wall::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 180px 80px at 12% 35%,rgba(255,255,255,.85) 0%,transparent 70%),
    radial-gradient(ellipse 240px 100px at 42% 22%,rgba(255,255,255,.8) 0%,transparent 70%),
    radial-gradient(ellipse 150px 70px at 78% 38%,rgba(255,255,255,.75) 0%,transparent 70%),
    radial-gradient(ellipse 100px 50px at 90% 18%,rgba(255,255,255,.6) 0%,transparent 70%);
}
#cake-wall::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:6px;
  background:linear-gradient(90deg,#c8a86a,#e8c880,#c8a86a);
}
#cake-floor{
  position:absolute;bottom:0;left:0;right:0;height:42%;
  background:linear-gradient(180deg,#d4a85c 0%,#b87830 60%,#8b5820 100%);
}
#cake-floor::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,transparent 0px,transparent 58px,rgba(0,0,0,.06) 58px,rgba(0,0,0,.06) 60px);
}
#cake-table{
  position:absolute;
  bottom:38%;left:50%;transform:translateX(-50%);
  width:min(560px,90vw);height:22px;
  background:linear-gradient(180deg,#f0d080 0%,#c8900c 40%,#a06808 100%);
  border-radius:6px 6px 3px 3px;
  box-shadow:0 6px 0 #7a5005, 0 8px 24px rgba(0,0,0,.45);
  z-index:1;
}
#cake-table::before{
  content:'';position:absolute;top:100%;left:12%;width:14%;height:min(120px,18vh);
  background:linear-gradient(180deg,#b07808,#8a5c04);
  border-radius:0 0 6px 6px;
  box-shadow:inset -3px 0 6px rgba(0,0,0,.2);
}
#cake-table::after{
  content:'';position:absolute;top:100%;right:12%;width:14%;height:min(120px,18vh);
  background:linear-gradient(180deg,#b07808,#8a5c04);
  border-radius:0 0 6px 6px;
  box-shadow:inset -3px 0 6px rgba(0,0,0,.2);
}
.cake-toy{
  position:absolute;bottom:calc(38% + 18px);
  height:min(180px,28vh);width:auto;
  filter:drop-shadow(4px 0 12px rgba(0,0,0,.35));
  z-index:2;
}
.toy-left{ left:max(8px, calc(50% - min(300px,46vw))); }
.toy-right{ right:max(8px, calc(50% - min(300px,46vw))); }
.toy-far-left{ left:max(8px, calc(50% - min(440px,66vw))); height:min(130px,20vh); opacity:.85; }
#s-cake.show{opacity:1;pointer-events:all;}
.ctitle{font-family:'Caveat',cursive;font-size:clamp(26px,4.5vw,46px);color:#fff;text-shadow:0 0 20px rgba(255,180,255,1),0 0 40px rgba(200,100,255,.8),0 2px 6px rgba(0,0,0,1);margin-bottom:6px;text-align:center;opacity:0;transform:translateY(-18px);transition:opacity .8s,transform .8s;}
.chint{font-family:'Share Tech Mono',monospace;font-size:clamp(13px,1.8vw,17px);color:#fff;text-shadow:0 0 12px rgba(150,220,255,.9),0 1px 4px rgba(0,0,0,1);letter-spacing:3px;text-transform:uppercase;margin-bottom:18px;opacity:0;transition:opacity .8s .3s;background:rgba(0,0,0,0.45);padding:5px 14px;border-radius:20px;}
#s-cake.show .ctitle{opacity:1;transform:translateY(0);}
#s-cake.show .chint{opacity:1;}
#hud{display:none;}
#tw{display:none;}
#tb{height:100%;width:100%;border-radius:3px;background:linear-gradient(90deg,#a78bfa,#f472b6,#fb923c);box-shadow:0 0 10px rgba(200,100,255,.5);transition:width .1s linear,background .5s;}
#res{display:none;}
#res.show{display:none;}
#res-t{font-family:'Caveat',cursive;font-size:clamp(24px,4.5vw,44px);color:transparent;background:linear-gradient(135deg,#fff,#e0d4ff,#ffaee0,#ffe066);-webkit-background-clip:text;background-clip:text;filter:drop-shadow(0 0 20px rgba(200,150,255,.6));margin-bottom:12px;}
#btn-again{padding:10px 28px;border-radius:40px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.07);color:#fff;font-family:'Share Tech Mono',monospace;font-size:13px;cursor:pointer;letter-spacing:2px;transition:background .2s;}
#btn-again:hover{background:rgba(167,139,250,.3);}

/* Snoopy character */
#snoopy-wrap{
  position:fixed;
  bottom:-280px;
  right:20px;
  width:190px;
  z-index:50;
  pointer-events:none;
  transition:bottom 1.2s cubic-bezier(.16,1,.3,1);
  animation:snoopy-float 3.5s ease-in-out infinite;
  filter:drop-shadow(0 4px 16px rgba(200,150,255,.5));
}
#snoopy-wrap.show{bottom:16px;}
#snoopy-cv{width:100%;display:block;}
@keyframes snoopy-float{
  0%,100%{transform:translateY(0) rotate(-2deg);}
  50%{transform:translateY(-14px) rotate(2deg);}
}

/* burst */
.burst{position:fixed;pointer-events:none;z-index:30;animation:fup var(--d) ease-out forwards;}
.burst img{width:var(--s);height:var(--s);}
@keyframes fup{0%{opacity:1;transform:translateY(0) scale(1) rotate(0deg);}100%{opacity:0;transform:translateY(-280px) scale(1.5) rotate(var(--r));}}
</style>
</head>
<body>
<canvas id="bg-cv"></canvas>
<div id="ov"></div>
<div id="curtain-l"></div>
<div id="curtain-r"></div>
<canvas id="fw-cv"></canvas>

<!-- Snoopy cake popup -->
<div id="snp-popup">
  <div id="snp-bubble">Поздравляю! 🎉</div>
  <img src="images/snoopy-gift.png" id="snp-pop-img" alt="Snoopy">
</div>

<!-- Snoopy character -->
<div id="snoopy-wrap">
<canvas id="snoopy-cv"></canvas>
</div>

<!-- Terminal -->
<div id="s-term">
  <div class="tbox">
    <div class="tbar"><div class="dot r"></div><div class="dot y"></div><div class="dot g"></div><div class="btitle">birthday.sh</div></div>
    <div class="tbody" id="tbody">
      <div class="tl vis"><span class="tp">❯</span><span class="tt" id="l0"></span><span class="tcur" id="tcur"></span></div>
    </div>
  </div>
</div>

<!-- Greeting Card -->
<div id="s-card">
  <div class="card-scene" onclick="openCard()">
    <div class="card-3d" id="card3d">
      <!-- Front -->
      <div class="card-front">
        <!-- Snoopy image fill -->
        <div class="cf-snp-photo">
          <img src="images/snoopy-gift.png" class="cf-snp-img" alt="Snoopy">
        </div>
        <div class="card-tap-hint">нажми чтобы открыть</div>
      </div>
      <!-- Inside -->
      <div class="card-back">
        <!-- Characters - Toy Story 4 poster -->
        <div class="ts-poster-wrap">
          <img src="images/ts4.jpg" alt="Toy Story" class="ts-poster-img">

function makeCheckerTex(){
  const cv=document.createElement('canvas');cv.width=cv.height=256;
  const c=cv.getContext('2d');
  const sz=32;
  for(let r=0;r<8;r++) for(let col=0;col<8;col++){
    c.fillStyle=(r+col)%2===0?'#1a1a1a':'#f5f0e8';
    c.fillRect(col*sz,r*sz,sz,sz);
  }
  const t=new THREE.CanvasTexture(cv);
  t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(2,1.3);return t;
}
function makeFloorTex(){
  // Warm wooden parquet planks
  const cv=document.createElement('canvas');cv.width=512;cv.height=512;
  const c=cv.getContext('2d');
  const WOODS=['#c8934a','#bf8840','#d4a05a','#c09048','#b87e38'];
  const PH=64; // plank height
  for(let row=0;row<8;row++){
    const off=(row%2===0)?0:128;
    for(let px=-128;px<512+128;px+=256){
      const x=px+off;
      c.fillStyle=WOODS[(row+Math.floor(px/256))%WOODS.length];
      c.fillRect(x,row*PH,248,PH-2);
      // grain lines
      c.strokeStyle='rgba(0,0,0,0.08)';c.lineWidth=1;
      for(let g=10;g<248;g+=30){c.beginPath();c.moveTo(x+g,row*PH);c.lineTo(x+g+5,row*PH+PH-2);c.stroke();}
    }
    c.strokeStyle='rgba(0,0,0,0.18)';c.lineWidth=2;
    c.strokeRect(0,row*PH,512,PH);
  }
  const t=new THREE.CanvasTexture(cv);
  t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(4,4);return t;
}
function makeWallTex(){
  // Andy's iconic blue sky + white clouds wallpaper
  const cv=document.createElement('canvas');cv.width=512;cv.height=512;
  const c=cv.getContext('2d');
  // sky gradient
  const g=c.createLinearGradient(0,0,0,512);
  g.addColorStop(0,'#7ec8e3');g.addColorStop(1,'#b8dff0');
  c.fillStyle=g;c.fillRect(0,0,512,512);
  // clouds
  function cloud(cx,cy,sc){
    c.fillStyle='rgba(255,255,255,0.92)';
    [[0,0,38],[34,8,28],[62,4,32],[-30,10,26],[28,-14,20],[-10,-16,18]].forEach(([dx,dy,r])=>{
      c.beginPath();c.arc(cx+dx*sc,cy+dy*sc,r*sc,0,Math.PI*2);c.fill();
    });
  }
  cloud(80,80,1);cloud(300,50,1.3);cloud(450,110,0.85);
  cloud(150,200,0.9);cloud(380,220,1.1);cloud(60,320,1.15);
  cloud(260,360,0.8);cloud(460,300,1);cloud(120,440,0.9);cloud(350,450,1.2);
  const t=new THREE.CanvasTexture(cv);
  t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(2,2);return t;
}

function makePhotoTex(colors,text){

  const c=cv.getContext('2d');

  c.fillStyle='#f5f0e8';c.fillRect(0,0,200,240);

function makeStarWallTex(W,H){
  const cv=document.createElement('canvas');cv.width=W;cv.height=H;
  const c=cv.getContext('2d');
  // deep night blue gradient
  const g=c.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#06102a');g.addColorStop(0.5,'#0a1a3a');g.addColorStop(1,'#081428');
  c.fillStyle=g;c.fillRect(0,0,W,H);
  // tiny star dots
  const rng=(s)=>{let x=s;return()=>{x=(x*16807)%2147483647;return(x-1)/2147483646;};};
  const r=rng(W*H);
  for(let i=0;i<260;i++){
    const sx=r()*W,sy=r()*H,sr=r()*1.1+.3,sa=.35+r()*.65;
    c.globalAlpha=sa;c.fillStyle='#ffffff';
    c.beginPath();c.arc(sx,sy,sr,0,Math.PI*2);c.fill();
  }
  // bigger sparkle stars
  function sparkle(sx,sy,sz,col){
    c.globalAlpha=.9;c.strokeStyle=col;c.lineWidth=sz*.3;
    for(let a=0;a<4;a++){
      const angle=a*Math.PI/4;
      c.beginPath();c.moveTo(sx,sy);
      c.lineTo(sx+Math.cos(angle)*sz,sy+Math.sin(angle)*sz);c.stroke();
    }
    c.globalAlpha=.7;c.fillStyle=col;
    c.beginPath();c.arc(sx,sy,sz*.25,0,Math.PI*2);c.fill();
  }
  const rs=rng(42);
  const COLS=['#fffde0','#ffeebb','#e8f4ff','#ffe8cc'];
  for(let i=0;i<18;i++) sparkle(rs()*W,rs()*H,4+rs()*8,COLS[Math.floor(rs()*COLS.length)]);
  c.globalAlpha=1;
  const t=new THREE.CanvasTexture(cv);
  t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(1,1);return t;
}

function buildRoom(){
  const FY=-2, CH=8, RW=22, Z_BACK=-11, Z_FRONT=7;
  const D=Z_FRONT-Z_BACK; // depth = 18
  const GH=2.5, BH=CH-FY-GH; // dark lower 2.5u, star upper 7.5u
  const GY=FY+GH/2, BY=FY+GH+BH/2;
  const CZ=(Z_FRONT+Z_BACK)/2; // center z = -2

  // Star wall texture (generated once, reused)
  const starTexB=makeStarWallTex(1024,512); // back/front wide
  const starTexS=makeStarWallTex(512,512);  // side walls

  function wPanel(mat,w,h,x,y,z,ry){
    const m=new THREE.Mesh(new THREE.PlaneGeometry(w,h),mat);
    m.position.set(x,y,z);if(ry)m.rotation.y=ry;scene.add(m);
  }
  const darkM  =()=>new THREE.MeshPhongMaterial({color:0x0a1428,shininess:5,side:THREE.DoubleSide});
  const starBM  =()=>new THREE.MeshPhongMaterial({map:starTexB,shininess:4,side:THREE.DoubleSide});
  const starSM  =()=>new THREE.MeshPhongMaterial({map:starTexS,shininess:4,side:THREE.DoubleSide});

  // Floor
  const flr=new THREE.Mesh(new THREE.PlaneGeometry(RW+4,D+2),
    new THREE.MeshPhongMaterial({map:makeFloorTex(),shininess:28}));
  flr.rotation.x=-Math.PI/2;flr.position.set(0,FY,CZ);
  flr.receiveShadow=true;scene.add(flr);

  // Ceiling (dark)
  wPanel(new THREE.MeshPhongMaterial({color:0x060e20,shininess:3,side:THREE.DoubleSide}),RW+4,D+2,0,CH,CZ);
  // fix rotation
  scene.children[scene.children.length-1].rotation.x=Math.PI/2;

  // ── BACK WALL (star) ──
  wPanel(starBM(),RW+2,BH, 0,BY,Z_BACK);
  wPanel(darkM(),RW+2,GH,  0,GY,Z_BACK+.01);

  // ── LEFT WALL (star behind mural) ──
  wPanel(starSM(),D,BH,-RW/2,BY,CZ,Math.PI/2);
  wPanel(darkM(),D,GH,-RW/2,GY,CZ,Math.PI/2);

  // ── RIGHT WALL (star) ──
  wPanel(starSM(),D,BH, RW/2,BY,CZ,-Math.PI/2);
  wPanel(darkM(),D,GH, RW/2,GY,CZ,-Math.PI/2);

  // ── FRONT WALL (4th wall — star) ──
  wPanel(starBM(),RW+2,BH, 0,BY,Z_FRONT,Math.PI);
  wPanel(darkM(),RW+2,GH,  0,GY,Z_FRONT+.01,Math.PI);

  // Baseboard strip
  const baseM=new THREE.MeshPhongMaterial({color:0x2a3550,shininess:15,side:THREE.DoubleSide});
  [[0,FY+GH,Z_BACK+.02,0,RW+2],[0,FY+GH,Z_FRONT-.01,Math.PI,RW+2],
   [-RW/2,FY+GH,CZ,Math.PI/2,D],[RW/2,FY+GH,CZ,-Math.PI/2,D]
  ].forEach(([x,y,z,ry,w])=>{
    const b=new THREE.Mesh(new THREE.PlaneGeometry(w,.2),baseM);
    b.position.set(x,y,z);if(ry)b.rotation.y=ry;scene.add(b);
  });

  // ── FRAMED SNOOPY PICTURES on back wall + MURAL ──
  const loader=new THREE.TextureLoader();

  // LEFT WALL mural — full wall coverage
  loader.load('images/photo_2026-06-19_06-23-59.jpg', tex=>{
    tex.minFilter=THREE.LinearFilter;
    const mural=new THREE.Mesh(new THREE.PlaneGeometry(D+2, CH-FY),
      new THREE.MeshBasicMaterial({map:tex}));
    mural.rotation.y=Math.PI/2;mural.position.set(-RW/2+.05,(CH+FY)/2,CZ);scene.add(mural);
  });

  // RIGHT WALL — hand-drawn bookshelf texture
  const bsTexCV=document.createElement('canvas');bsTexCV.width=1024;bsTexCV.height=1024;
  const bc=bsTexCV.getContext('2d');
  const rngB=(s)=>{let x=s;return()=>{x=(x*16807)%2147483647;return(x-1)/2147483646;};};
  const rb=rngB(13);
  // wood background
  const woodGrad=bc.createLinearGradient(0,0,0,1024);
  woodGrad.addColorStop(0,'#5c3310');woodGrad.addColorStop(0.5,'#7a4520');woodGrad.addColorStop(1,'#5c3310');
  bc.fillStyle=woodGrad;bc.fillRect(0,0,1024,1024);
  // grain lines
  bc.strokeStyle='rgba(0,0,0,0.15)';bc.lineWidth=1;
  for(let i=0;i<30;i++){bc.beginPath();bc.moveTo(0,rb()*1024);bc.lineTo(1024,rb()*1024+rb()*60-30);bc.stroke();}

  const BCOLS=['#c0392b','#2980b9','#27ae60','#f39c12','#8e44ad','#e67e22',
    '#16a085','#d35400','#1abc9c','#2c3e50','#e74c3c','#3498db',
    '#2ecc71','#f1c40f','#9b59b6','#e91e63','#00bcd4','#ff5722',
    '#607d8b','#795548','#ff9800','#4caf50','#673ab7','#009688'];

  const SHELF_H=118; // height of each shelf section (pixels)
  const NROWS=Math.floor(1024/SHELF_H);
  const SHELF_BOARD=14;

  for(let row=0;row<NROWS;row++){
    const rowY=row*SHELF_H;
    const bookAreaH=SHELF_H-SHELF_BOARD;

    // shelf board
    const shelfGrad=bc.createLinearGradient(0,rowY+bookAreaH,0,rowY+SHELF_H);
    shelfGrad.addColorStop(0,'#a0681a');shelfGrad.addColorStop(0.4,'#c8882a');shelfGrad.addColorStop(1,'#7a4c12');
    bc.fillStyle=shelfGrad;bc.fillRect(0,rowY+bookAreaH,1024,SHELF_BOARD);
    // shelf edge highlight
    bc.fillStyle='rgba(255,220,150,0.3)';bc.fillRect(0,rowY+bookAreaH,1024,2);
    bc.fillStyle='rgba(0,0,0,0.25)';bc.fillRect(0,rowY+SHELF_H-2,1024,2);

    // books on this shelf
    let bx=4;
    while(bx<1020){
      const bw=Math.floor(28+rb()*38); // book width
      const bh=Math.floor(bookAreaH*0.62+rb()*bookAreaH*0.35); // book height
      const by=rowY+bookAreaH-bh; // books sit on shelf
      const col=BCOLS[Math.floor(rb()*BCOLS.length)];

      // book body
      const bookGrad=bc.createLinearGradient(bx,0,bx+bw,0);
      bookGrad.addColorStop(0,col);
      bookGrad.addColorStop(0.08,'rgba(255,255,255,0.22)');
      bookGrad.addColorStop(0.15,col);
      bookGrad.addColorStop(0.9,col);
      bookGrad.addColorStop(1,'rgba(0,0,0,0.3)');
      bc.fillStyle=bookGrad;bc.fillRect(bx,by,bw,bh);

      // spine line separator
      bc.fillStyle='rgba(0,0,0,0.35)';bc.fillRect(bx,by,1,bh);
      bc.fillStyle='rgba(255,255,255,0.15)';bc.fillRect(bx+1,by,1,bh);

      // top edge of book (lighter)
      bc.fillStyle='rgba(255,255,255,0.25)';bc.fillRect(bx,by,bw,3);

      // horizontal stripe decoration (some books)
      if(rb()<0.5){
        bc.fillStyle='rgba(255,255,255,0.18)';
        bc.fillRect(bx+2,by+Math.floor(bh*0.3),bw-4,Math.floor(bh*0.08));
        if(rb()<0.4){
          bc.fillRect(bx+2,by+Math.floor(bh*0.5),bw-4,Math.floor(bh*0.06));
        }
      }

      // small title text on spine (for wider books)
      if(bw>40){
        bc.save();bc.translate(bx+bw/2,by+bh/2);bc.rotate(-Math.PI/2);
        bc.fillStyle='rgba(255,255,255,0.7)';bc.font=`bold ${Math.floor(bw*0.28)}px Arial`;
        bc.textAlign='center';bc.textBaseline='middle';
        const titles=['Love','Life','Art','Joy','Hope','Dream','Star','Moon','Sun','Magic'];
        bc.fillText(titles[Math.floor(rb()*titles.length)],0,0);
        bc.restore();
      }

      bx+=bw+2;
    }

    // occasional decorative object on shelf
    if(rb()<0.4){
      const ox=Math.floor(100+rb()*800);
      const oy=rowY+bookAreaH;
      // small vase or figurine
      bc.fillStyle=rb()<0.5?'#c0392b':'#f5d78e';
      bc.beginPath();bc.ellipse(ox,oy-18,12,18,0,0,Math.PI*2);bc.fill();
      bc.fillStyle='rgba(255,255,255,0.2)';
      bc.beginPath();bc.ellipse(ox-4,oy-24,4,8,0,0,Math.PI*2);bc.fill();
    }
  }

  const bsTex=new THREE.CanvasTexture(bsTexCV);
  bsTex.minFilter=THREE.LinearFilter;
  const bsWall=new THREE.Mesh(new THREE.PlaneGeometry(D+2, CH-FY),
    new THREE.MeshBasicMaterial({map:bsTex}));
  bsWall.rotation.y=-Math.PI/2;
  bsWall.position.set(RW/2-.05,(CH+FY)/2,CZ);
  scene.add(bsWall);
  [
    {src:'images/photo_2026-06-19_05-59-45.jpg',x:-7.2,y:5.8,w:3.6,h:3.6},
    {src:'images/photo_2026-06-19_05-59-41.jpg',x:-2.4,y:5.6,w:3.4,h:4.0},
    {src:'images/photo_2026-06-19_05-59-37.jpg',x: 2.6,y:6.0,w:2.6,h:4.0},
    {src:'images/photo_2026-06-19_05-59-49.jpg',x: 7.4,y:5.6,w:3.2,h:3.2},
  ].forEach(({src,x,y,w,h})=>{
    // shadow
    const sh=new THREE.Mesh(new THREE.PlaneGeometry(w+.55,h+.55),
      new THREE.MeshBasicMaterial({color:0x000000,transparent:true,opacity:.14}));
    sh.position.set(x+.06,y-.07,Z_BACK+.02);scene.add(sh);
    // frame
    const fr=new THREE.Mesh(new THREE.PlaneGeometry(w+.32,h+.32),
      new THREE.MeshPhongMaterial({color:0xffffff,shininess:55}));
    fr.position.set(x,y,Z_BACK+.04);scene.add(fr);
    // picture
    loader.load(src,tex=>{
      const pic=new THREE.Mesh(new THREE.PlaneGeometry(w,h),
        new THREE.MeshBasicMaterial({map:tex}));
      pic.position.set(x,y,Z_BACK+.06);scene.add(pic);
    });
  });

  // ── BIRTHDAY STREAMERS (garlands) ──
  const SC=[0xff6b9d,0xffdd00,0x6bcfff,0xff8844,0xaa66ff,0xff4466,0x44cc88];
  [
    [new THREE.Vector3(-10,CH-.2,Z_FRONT-1),new THREE.Vector3(0,CH-1.8,-2),new THREE.Vector3(10,CH-.2,Z_BACK+1)],
    [new THREE.Vector3(-10,CH-.2,-3),new THREE.Vector3(0,CH-1.6,-6),new THREE.Vector3(10,CH-.2,-9)],
    [new THREE.Vector3(-9,CH-.2,Z_BACK+2),new THREE.Vector3(0,CH-1.4,1),new THREE.Vector3(9,CH-.2,Z_FRONT-2)],
  ].forEach((pts,i)=>{
    const curve=new THREE.CatmullRomCurve3(pts);
    scene.add(new THREE.Mesh(new THREE.TubeGeometry(curve,30,.045,6,false),
      new THREE.MeshPhongMaterial({color:SC[i],shininess:60})));
    for(let t=.08;t<1;t+=.11){
      const pt=curve.getPoint(t);
      const pg=new THREE.ConeGeometry(.14,.28,4);
      const pm=new THREE.Mesh(pg,new THREE.MeshPhongMaterial({color:SC[(i*4+Math.floor(t*10))%SC.length]}));
      pm.position.copy(pt);pm.position.y-=.22;pm.rotation.z=Math.PI;scene.add(pm);
    }
  });

  // ── 3D BALLOONS ──
  const BC=[0xff6b9d,0xffdd00,0x6bcfff,0xff8844,0xaa66ff,0xff4466,0x44cc88,0xff99cc];
  [[-8.5,CH-1,-8],[-7,CH-.8,-3],[-8.2,CH-1.2,0],[8.5,CH-1,-8],[7,CH-.8,-3],[8.2,CH-1.2,0],
   [-3.5,CH-.6,-10],[0,CH-.5,-10.5],[3.5,CH-.6,-10],[-2,CH-1,Z_FRONT-2],[2,CH-1,Z_FRONT-2]
  ].forEach(([bx,by,bz],i)=>{
    const col=BC[i%BC.length];
    const ball=new THREE.Mesh(new THREE.SphereGeometry(.52,12,12),
      new THREE.MeshPhongMaterial({color:col,shininess:120,emissive:col,emissiveIntensity:.07}));
    ball.scale.y=1.28;ball.position.set(bx,by,bz);scene.add(ball);
    // shine
    const sh=new THREE.Mesh(new THREE.SphereGeometry(.13,8,8),
      new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:.45}));
    sh.position.set(bx-.14,by+.22,bz+.32);scene.add(sh);
    // string
    const sp=[new THREE.Vector3(bx,by-.68,bz),new THREE.Vector3(bx+.12,by-2,bz),
              new THREE.Vector3(bx+(Math.random()-.5)*.5,FY+1+Math.random()*2,bz)];
    scene.add(new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(sp),8,.012,4,false),
      new THREE.MeshBasicMaterial({color:0xbbbbbb})));
  });

  // ── CEILING LAMP ──
  const lampM=new THREE.MeshPhongMaterial({color:0xffffee,shininess:70,emissive:0xffeeaa,emissiveIntensity:.25});
  const lampBody=new THREE.Mesh(new THREE.CylinderGeometry(.3,.5,.4,16),lampM);
  lampBody.position.set(0,CH-.18,0);scene.add(lampBody);
  for(let i=0;i<5;i++){
    const lk=new THREE.Mesh(new THREE.TorusGeometry(.04,.012,6,8),
      new THREE.MeshPhongMaterial({color:0x888888}));
    lk.position.set(0,CH-.6-i*.18,0);lk.rotation.x=Math.PI/2;scene.add(lk);
  }
}

function buildBookshelf(){
  const FY=-2, RW=22, CH=8;
  const WX=RW/2;   // right wall x=11
  const BW=7.0, BH=6.5, BD=1.1, CZ=-2;

  const rng=(s)=>{let x=s;return()=>{x=(x*16807)%2147483647;return(x-1)/2147483646;};};
  const r=rng(77);

  const woodLight=new THREE.MeshPhongMaterial({color:0xc8873a,shininess:35});
  const woodDark =new THREE.MeshPhongMaterial({color:0x6b3c12,shininess:10});
  const woodMid  =new THREE.MeshPhongMaterial({color:0x9a5c22,shininess:22});

  // ── structural frame (just 8 box meshes) ──
  // back panel
  const bk=new THREE.Mesh(new THREE.BoxGeometry(0.09,BH,BW),woodDark);
  bk.position.set(WX-BD+0.04,FY+BH/2,CZ);scene.add(bk);
  // sides
  [CZ-BW/2,CZ+BW/2].forEach(z=>{
    const s=new THREE.Mesh(new THREE.BoxGeometry(BD,BH,0.1),woodLight);
    s.position.set(WX-BD/2,FY+BH/2,z);scene.add(s);
  });
  // top & bottom
  [FY+BH+0.06,FY-0.06].forEach(y=>{
    const b=new THREE.Mesh(new THREE.BoxGeometry(BD,0.12,BW+0.12),woodLight);
    b.position.set(WX-BD/2,y,CZ);scene.add(b);
  });
  // shelves
  [1.2,2.45,3.7,4.95].forEach(sh=>{
    const s=new THREE.Mesh(new THREE.BoxGeometry(BD,0.09,BW),woodMid);
    s.position.set(WX-BD/2,FY+sh,CZ);scene.add(s);
  });
  // crown
  const crown=new THREE.Mesh(new THREE.BoxGeometry(BD+0.1,0.2,BW+0.2),woodLight);
  crown.position.set(WX-BD/2,FY+BH+0.16,CZ);scene.add(crown);

  // ── each shelf = one canvas-texture plane with painted books ──
  const BOOK_COLS=['#e63946','#457b9d','#2a9d8f','#e9c46a','#f4a261',
    '#6d2b8f','#c04080','#80b918','#ff6b6b','#264653',
    '#f72585','#4cc9f0','#7b2d8b','#ffd166','#06d6a0',
    '#118ab2','#ef476f','#ffd60a','#3a86ff','#8338ec'];

  [0.12,1.32,2.52,3.77].forEach((sh,si)=>{
    const CW=512, CH2=128;
    const cv=document.createElement('canvas');cv.width=CW;cv.height=CH2;
    const c=cv.getContext('2d');
    c.fillStyle='#3a1e05';c.fillRect(0,0,CW,CH2);
    let px=4;let bi=si*5;
    while(px<CW-4){
      const bw=Math.floor(18+r()*16);
      const bh=Math.floor(70+r()*50);
      const col=BOOK_COLS[(bi++)%BOOK_COLS.length];
      const by=CH2-4-bh;
      c.fillStyle=col;c.fillRect(px,by,bw,bh);
      // spine line
      c.fillStyle='rgba(255,255,255,0.18)';c.fillRect(px+2,by+4,2,bh-8);
      // top highlight
      c.fillStyle='rgba(255,255,255,0.12)';c.fillRect(px,by,bw,3);
      px+=bw+2+Math.floor(r()*3);
    }
    const tex=new THREE.CanvasTexture(cv);
    const shelf=new THREE.Mesh(
      new THREE.PlaneGeometry(BW,1.1),
      new THREE.MeshBasicMaterial({map:tex,side:THREE.DoubleSide})
    );
    shelf.rotation.y=-Math.PI/2;
    shelf.position.set(WX-BD*0.6,FY+sh+0.55,CZ);
    scene.add(shelf);
  });

  // ── decorative objects on top ──
  // plant
  const potM=new THREE.MeshPhongMaterial({color:0xc1440e,shininess:30});
  const pot=new THREE.Mesh(new THREE.CylinderGeometry(0.18,0.13,0.32,10),potM);
  pot.position.set(WX-0.55,FY+BH+0.22,CZ-2.5);scene.add(pot);
  const leaf=new THREE.Mesh(new THREE.SphereGeometry(0.22,8,6),
    new THREE.MeshPhongMaterial({color:0x2d8a2d}));
  leaf.scale.set(1,0.65,1);leaf.position.set(WX-0.55,FY+BH+0.54,CZ-2.5);scene.add(leaf);
  // gold cup
  const cupM=new THREE.MeshPhongMaterial({color:0xffd700,shininess:100});
  const cup=new THREE.Mesh(new THREE.CylinderGeometry(0.15,0.1,0.35,10),cupM);
  cup.position.set(WX-0.55,FY+BH+0.23,CZ+2.5);scene.add(cup);
  const cupT=new THREE.Mesh(new THREE.SphereGeometry(0.15,8,6),cupM);
  cupT.scale.y=0.5;cupT.position.set(WX-0.55,FY+BH+0.44,CZ+2.5);scene.add(cupT);
}

function addFlowerPot(x, z, col){
  const FY=-2;
  const potM=new THREE.MeshPhongMaterial({color:0xb83c0c,shininess:20});
  const stemM=new THREE.MeshPhongMaterial({color:0x2d8a2d,shininess:5});
  const flwM=new THREE.MeshPhongMaterial({color:col,shininess:50,emissive:col,emissiveIntensity:0.2});
  const yloM=new THREE.MeshPhongMaterial({color:0xffdd00,shininess:60});
  // pot
  const pot=new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.14,0.36,14),potM);
  pot.position.set(x,FY+0.18,z);scene.add(pot);
  // soil
  const soil=new THREE.Mesh(new THREE.CircleGeometry(0.19,12),new THREE.MeshLambertMaterial({color:0x2a1000}));
  soil.rotation.x=-Math.PI/2;soil.position.set(x,FY+0.36,z);scene.add(soil);
  // stem
  const stem=new THREE.Mesh(new THREE.CylinderGeometry(0.025,0.03,0.52,8),stemM);
  stem.position.set(x,FY+0.62,z);scene.add(stem);
  // petals
  for(let i=0;i<6;i++){
    const a=(Math.PI*2/6)*i;
    const p=new THREE.Mesh(new THREE.SphereGeometry(0.1,8,6),flwM);
    p.scale.set(0.55,0.4,1);
    p.position.set(x+Math.cos(a)*0.13, FY+0.9, z+Math.sin(a)*0.13);
    scene.add(p);
  }
  // center
  const ctr=new THREE.Mesh(new THREE.SphereGeometry(0.1,10,10),yloM);
  ctr.position.set(x,FY+0.92,z);scene.add(ctr);
  // two leaves
  [-0.3,0.3].forEach(a=>{
    const lf=new THREE.Mesh(new THREE.SphereGeometry(0.13,8,6),stemM);
    lf.scale.set(0.9,0.3,0.5);
    lf.position.set(x+Math.sin(a)*0.2,FY+0.56,z+Math.cos(a)*0.08);
    scene.add(lf);
  });
}

function addCandles(){
  const topY=cakeGroup.position.y+2.08;
  const DIGITS=['1','9'];
  const POS=[[-0.28,0],[0.28,0]];

  function makeMetalTex(digit){
    const W=180,H=240;
    const cv=document.createElement('canvas');cv.width=W;cv.height=H;
    const c=cv.getContext('2d');
    c.clearRect(0,0,W,H);
    c.font=`bold 190px Arial Black, Arial`;c.textAlign='center';c.textBaseline='middle';
    // dark outline for crisp edge
    c.strokeStyle='#2a2a40';c.lineWidth=14;c.strokeText(digit,W/2,H/2);
    // chrome gradient fill
    const g=c.createLinearGradient(0,10,0,H-10);
    g.addColorStop(0,'#e0e4f8');g.addColorStop(0.2,'#b8bcd8');
    g.addColorStop(0.45,'#f0f4ff');g.addColorStop(0.65,'#9098b8');
    g.addColorStop(0.85,'#c8ccde');g.addColorStop(1,'#d8dcee');
    c.fillStyle=g;c.fillText(digit,W/2,H/2);
    // white shine strip
    c.fillStyle='rgba(255,255,255,0.45)';
    c.font=`bold 190px Arial Black, Arial`;
    c.fillText(digit,W/2,H/2-8);
    return new THREE.CanvasTexture(cv);
  }

  DIGITS.forEach((digit,i)=>{
    const [cx,cz]=POS[i];
    const CW=digit==='1'?0.30:0.40, CH=0.68;

    // thin metal stick
    const stick=new THREE.Mesh(new THREE.CylinderGeometry(0.014,0.014,0.48,8),
      new THREE.MeshPhongMaterial({color:0xccccdd,shininess:120,specular:0xffffff}));
    stick.position.set(cx,topY+0.24,cz);scene.add(stick);

    // number shape — flat plane, DoubleSide so visible from any orbit
    const numMesh=new THREE.Mesh(new THREE.PlaneGeometry(CW,CH),
      new THREE.MeshPhongMaterial({
        map:makeMetalTex(digit),transparent:true,alphaTest:0.08,
        shininess:160,specular:new THREE.Color(0xaaaacc),side:THREE.DoubleSide
      }));
    numMesh.position.set(cx,topY+0.48+CH/2,cz);
    scene.add(numMesh);candleObjs.push(numMesh);

    // wick
    const wick=new THREE.Mesh(new THREE.CylinderGeometry(0.007,0.007,0.11,6),
      new THREE.MeshPhongMaterial({color:0x221100}));
    wick.position.set(cx,topY+0.48+CH+0.055,cz);scene.add(wick);

    // flame sprite
    const flameMat=new THREE.MeshBasicMaterial({color:0xffcc44,transparent:true,opacity:1,
      side:THREE.DoubleSide,depthWrite:false,blending:THREE.AdditiveBlending});
    const flame=new THREE.Mesh(new THREE.PlaneGeometry(0.13,0.24),flameMat);
    const flameY=topY+0.48+CH+0.21;
    flame.position.set(cx,flameY,cz);
    flame.userData={blown:false,candleIdx:i,baseY:flameY};
    scene.add(flame);flameObjs.push(flame);

    // warm point light
    const pl=new THREE.PointLight(0xffcc44,0.8,3);
    pl.position.set(cx,flameY+0.1,cz);scene.add(pl);pointLights.push(pl);

function flickerFlames(t){
  flameObjs.forEach((f,i)=>{
    if(f.userData.blown)return;
    const s=0.85+Math.sin(t*12+i*1.7)*0.12+Math.sin(t*19+i*3.3)*0.06;
    f.scale.set(s,0.9+Math.sin(t*15+i*2.1)*0.1,s);
    f.position.y=f.userData.baseY+Math.sin(t*11+i*2.9)*0.01;
    f.lookAt(camera.position);
    pointLights[i].intensity=0.5+Math.sin(t*13+i*1.9)*0.15;
  });
}

// Called every frame from animate3
function animateWater(t){
  if(!waterGeo1||!waterGeo2)return;
  const p1=waterGeo1.attributes.position;
  for(let i=0;i<p1.count;i++){
    const x=p1.getX(i), y=p1.getY(i);
    p1.setZ(i,
      Math.sin(x*0.18+t*0.65)*0.22 +
      Math.sin(y*0.24+t*0.90)*0.18 +
      Math.sin((x*0.12+y*0.15)+t*0.50)*0.13 +
      Math.sin(x*0.07-t*0.38)*0.09
    );
  }
  p1.needsUpdate=true;
  waterGeo1.computeVertexNormals();

  const p2=waterGeo2.attributes.position;
  const t2=t+1.3;
  for(let i=0;i<p2.count;i++){
    const x=p2.getX(i), y=p2.getY(i);
    p2.setZ(i,
      Math.sin(x*0.38+t2*1.4)*0.10 +
      Math.sin(y*0.42+t2*1.1)*0.08 +
      Math.sin((x-y)*0.22+t2*0.9)*0.06
    );
  }
  p2.needsUpdate=true;
  waterGeo2.computeVertexNormals();
}

/* ══ MANUAL ORBIT CAMERA ══ */
let orbitTheta=0, orbitPhi=Math.PI/3, orbitR=6.5;
let orbitDragging=false, orbitLastX=0, orbitLastY=0, orbitVX=0, orbitVY=0;
const ORBIT_TARGET=new THREE.Vector3(0,1,0);

function initOrbit(el){
  el.addEventListener('mousedown',e=>{orbitDragging=true;orbitLastX=e.clientX;orbitLastY=e.clientY;orbitVX=orbitVY=0;});
  el.addEventListener('touchstart',e=>{orbitDragging=true;orbitLastX=e.touches[0].clientX;orbitLastY=e.touches[0].clientY;orbitVX=orbitVY=0;},{passive:true});
  window.addEventListener('mousemove',e=>{
    if(!orbitDragging)return;
    orbitVX=(e.clientX-orbitLastX)*.005; orbitVY=(e.clientY-orbitLastY)*.005;
    orbitTheta-=orbitVX; orbitPhi=Math.max(.1,Math.min(Math.PI*.82,orbitPhi+orbitVY));
    orbitLastX=e.clientX; orbitLastY=e.clientY;
  });
  window.addEventListener('touchmove',e=>{
    if(!orbitDragging)return;
    orbitVX=(e.touches[0].clientX-orbitLastX)*.005; orbitVY=(e.touches[0].clientY-orbitLastY)*.005;
    orbitTheta-=orbitVX; orbitPhi=Math.max(.1,Math.min(Math.PI*.82,orbitPhi+orbitVY));
    orbitLastX=e.touches[0].clientX; orbitLastY=e.touches[0].clientY;
  },{passive:true});
  window.addEventListener('mouseup',()=>orbitDragging=false);
  window.addEventListener('touchend',()=>orbitDragging=false);
}

function updateOrbit(){
  if(!orbitDragging){orbitVX*=.88;orbitVY*=.88;orbitTheta-=orbitVX;orbitPhi=Math.max(.1,Math.min(Math.PI*.82,orbitPhi+orbitVY));}
  const x=ORBIT_TARGET.x+orbitR*Math.sin(orbitPhi)*Math.sin(orbitTheta);
  const y=ORBIT_TARGET.y+orbitR*Math.cos(orbitPhi);
  const z=ORBIT_TARGET.z+orbitR*Math.sin(orbitPhi)*Math.cos(orbitTheta);
  camera.position.set(x,y,z);
  camera.lookAt(ORBIT_TARGET);
}

  ];

  function roundRect(nc,x,y,w,h,r){
    nc.beginPath();
    nc.moveTo(x+r,y);nc.lineTo(x+w-r,y);nc.arcTo(x+w,y,x+w,y+r,r);
    nc.lineTo(x+w,y+h-r);nc.arcTo(x+w,y+h,x+w-r,y+h,r);
    nc.lineTo(x+r,y+h);nc.arcTo(x,y+h,x,y+h-r,r);

  function drawStar(nc,cx,cy,r,col){
    nc.save();nc.fillStyle=col;nc.globalAlpha=0.55;
    nc.translate(cx,cy);

    for(let i=0;i<5;i++){
      const a=i*Math.PI*2/5-Math.PI/2;
      const b=a+Math.PI/5;
      nc.lineTo(Math.cos(a)*r,Math.sin(a)*r);
      nc.lineTo(Math.cos(b)*r*.42,Math.sin(b)*r*.42);

    // ── small decorative stars / hearts ──

const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();

function onSceneClick(e){
  const rect=document.getElementById('three-cv').getBoundingClientRect();
  mouse.x=((e.clientX-rect.left)/rect.width)*2-1;
  mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(mouse,camera);

  if(!gameStarted){
    gameStarted=true;
    document.getElementById('chint').textContent='нажми на каждое пламя!';
    startTimer();
  }
  if(!gameActive&&gameStarted)return;
  const hits=raycaster.intersectObjects(flameObjs);
  if(hits.length){
    const fl=hits[0].object;
    if(!fl.userData.blown)blowFlame(fl);
  }
}

function blowFlame(fl){
  fl.userData.blown=true;
  const i=fl.userData.candleIdx;
  fl.material.opacity=0;fl.material.transparent=true;
  pointLights[i].intensity=0;
  // smoke
  const sg=new THREE.Mesh(new THREE.SphereGeometry(0.04,8,8),new THREE.MeshBasicMaterial({color:0xcccccc,transparent:true,opacity:0.7}));
  sg.position.copy(candleObjs[i].position);sg.position.y+=0.44;
  scene.add(sg);
  let smokeT=0;
  const smokeAnim=()=>{smokeT+=0.04;sg.position.y+=0.02;sg.material.opacity=Math.max(0,0.7-smokeT*1.4);sg.scale.setScalar(1+smokeT*2);if(smokeT<0.5)requestAnimationFrame(smokeAnim);else scene.remove(sg);};
  smokeAnim();
  blownOut++;
  document.getElementById('ln').textContent=totalC-blownOut;
  if(blownOut===totalC)win();
}

/* ══ CONFETTI POPPERS ══ */
function startConfetti(){
  const cv=document.getElementById('fw-cv');
  cv.width=innerWidth;cv.height=innerHeight;
  const c=cv.getContext('2d');
  const W=cv.width,H=cv.height;
  const COLS=['#ff4466','#44aaff','#ffdd00','#aa44ff','#ff8844','#44cc88','#ff66cc','#00ccff','#ffe066','#ff99cc'];
  const parts=[];
  // 5 хлопушек по экрану
  [[.08,.75,-2.2],[.92,.75,-1.0],[.25,.85,-1.8],[.75,.85,-1.3],[.5,.9,-1.55]].forEach(([xf,yf,baseA],pi)=>{
    for(let i=0;i<90;i++){
      const a=baseA+(Math.random()-.5)*1.1;
      const spd=9+Math.random()*20;
      const isStrip=Math.random()>.5;
      parts.push({
        x:W*xf,y:H*yf,
        vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,
        rot:Math.random()*Math.PI*2,rotV:(Math.random()-.5)*.35,
        w:isStrip?4+Math.random()*4:7+Math.random()*7,
        h:isStrip?10+Math.random()*8:4+Math.random()*4,
        col:COLS[Math.floor(Math.random()*COLS.length)],
        life:1,decay:.006+Math.random()*.006,
        delay:pi*90+Math.random()*60,
        circle:Math.random()>.75
      });
    }
  });
  let t0=null;
  (function frame(ts){
    if(!t0)t0=ts;
    const el=ts-t0;
    c.clearRect(0,0,W,H);
    let alive=false;
    parts.forEach(p=>{
      if(el<p.delay)return;
      p.x+=p.vx;p.y+=p.vy;p.vy+=.45;p.vx*=.98;
      p.rot+=p.rotV;p.life-=p.decay;
      if(p.life<=0)return;
      alive=true;
      c.save();
      c.globalAlpha=Math.min(1,p.life*2.5);
      c.translate(p.x,p.y);c.rotate(p.rot);
      c.fillStyle=p.col;
      if(p.circle){c.beginPath();c.arc(0,0,p.w/2,0,Math.PI*2);c.fill();}
      else c.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      c.restore();
    });
    if(alive||el<600)requestAnimationFrame(frame);
    else c.clearRect(0,0,W,H);
  })();
}

/* ══ YEEE CHEER SOUND ══ */
function playYeee(){
  const AC=window.AudioContext||window.webkitAudioContext;
  if(!AC)return;
  const ac=new AC();
  // "Йиии!" — rising excited cheer
  // multiple voices stacked for chorus effect
  [0,3,-3,5,-5].forEach((detune,vi)=>{
    const osc=ac.createOscillator();
    const g=ac.createGain();
    const dist=ac.createWaveShaper();
    // soft distortion curve for "voice" texture
    const curve=new Float32Array(256);
    for(let i=0;i<256;i++){const x=i*2/256-1;curve[i]=x*(Math.abs(x)+0.3)/(Math.abs(x)*1.3+0.3);}
    dist.curve=curve;
    osc.connect(dist);dist.connect(g);g.connect(ac.destination);
    osc.type='sawtooth';
    // start low, rocket up then settle — "YEEE!"
    const t=ac.currentTime+vi*0.015;
    osc.frequency.setValueAtTime(180+detune,t);
    osc.frequency.exponentialRampToValueAtTime(680+detune,t+0.08);
    osc.frequency.exponentialRampToValueAtTime(520+detune,t+0.22);
    osc.frequency.setValueAtTime(520+detune,t+0.22);
    osc.frequency.exponentialRampToValueAtTime(480+detune,t+0.55);
    // vibrato after peak
    const lfo=ac.createOscillator();
    const lfoG=ac.createGain();
    lfo.frequency.value=5.5+vi*0.4;lfoG.gain.value=8;
    lfo.connect(lfoG);lfoG.connect(osc.frequency);lfo.start(t+0.1);lfo.stop(t+0.6);
    // envelope
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(0.18-vi*0.02,t+0.04);
    g.gain.setValueAtTime(0.16-vi*0.02,t+0.22);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.65);
    osc.start(t);osc.stop(t+0.7);
  });
}

/* ══ HAPPY BIRTHDAY MELODY ══ */
function playHappyBirthday(){
  const AC=window.AudioContext||window.webkitAudioContext;
  if(!AC)return;
  const ac=new AC();
  const BPM=108, B=60/BPM;
  // [частота Гц, доли такта]  — мелодия "Happy Birthday to You"
  const SCORE=[
    [392,.75],[392,.25],[440,1],[392,1],[523,1],[494,2],
    [392,.75],[392,.25],[440,1],[392,1],[587,1],[523,2],
    [392,.75],[392,.25],[784,1],[659,1],[523,.75],[494,.25],[440,2],
    [698,.75],[698,.25],[659,1],[523,1],[587,1],[523,2.5]
  ];
  // Два осциллятора для тепла звука
  let t=ac.currentTime+.08;
  SCORE.forEach(([freq,beats])=>{
    if(freq>0){
      ['triangle','sine'].forEach((type,ti)=>{
        const osc=ac.createOscillator();
        const g=ac.createGain();
        const vol=ti===0?.13:.06;
        osc.connect(g);g.connect(ac.destination);
        osc.type=type;
        osc.frequency.value=ti===0?freq:freq*2.005; // лёгкий хорус
        g.gain.setValueAtTime(0,t);
        g.gain.linearRampToValueAtTime(vol,t+.03);
        g.gain.setValueAtTime(vol,t+beats*B-.06);
        g.gain.linearRampToValueAtTime(0,t+beats*B);
        osc.start(t);osc.stop(t+beats*B+.01);
      });
    }
    t+=beats*B;
  });
}

/* ══ SPIDER-MAN WEB WIN ══ */
function startSpiderWin(){
  const cv=document.getElementById('fw-cv');
  cv.width=innerWidth;cv.height=innerHeight;
  const c=cv.getContext('2d');
  const W=cv.width,H=cv.height;

  // Build web strands from corner/edge origins
  const strands=[];
  function addOrigin(ox,oy,aMin,aMax,count,delay0){
    for(let i=0;i<count;i++){
      const a=aMin+(aMax-aMin)*(i/Math.max(count-1,1));
      strands.push({
        ox,oy,a,len:0,
        maxLen:Math.hypot(W,H)*1.15,
        delay:delay0+i*28+Math.random()*60,
        speed:480+Math.random()*320,
        thick:i%4===0?2.2:0.9
      });
    }
  }
  addOrigin(0,   0,    0,          Math.PI/2,      20, 0);
  addOrigin(W,   0,    Math.PI/2,  Math.PI,        20, 80);
  addOrigin(W/2, 0,    Math.PI*0.08,Math.PI*0.92, 14, 280);
  addOrigin(0,   H/2, -0.5,        Math.PI/2+0.5, 10, 480);
  addOrigin(W,   H/2,  Math.PI/2-0.5,Math.PI+0.5,10, 480);
  addOrigin(W*.3,H+5,  Math.PI*1.05,Math.PI*1.95,  9, 650);
  addOrigin(W*.7,H+5,  Math.PI*1.05,Math.PI*1.95,  9, 720);

  // Ring distances for cross-thread connections
  const RINGS=[55,120,210,330,470,640,840,1060];

  // Group sizes (matching addOrigin order)
  const GSIZES=[20,20,14,10,10,9,9];

  let t0=null;

  function frame(ts){
    if(!t0)t0=ts;
    const t=(ts-t0)/1000;

    // Dark background fills in
    const bgA=Math.min(0.92,t*0.6);
    c.fillStyle=`rgba(1,3,12,${bgA.toFixed(2)})`;
    c.fillRect(0,0,W,H);

    c.save();
    c.lineCap='round';

    // Radial strands
    strands.forEach(s=>{
      const el=t*1000-s.delay;
      if(el<=0)return;
      s.len=Math.min(s.maxLen,el/1000*s.speed);
      c.beginPath();
      c.moveTo(s.ox,s.oy);
      c.lineTo(s.ox+Math.cos(s.a)*s.len, s.oy+Math.sin(s.a)*s.len);
      c.lineWidth=s.thick;
      c.strokeStyle=s.thick>1?'rgba(210,240,255,0.8)':'rgba(155,210,255,0.42)';
      c.shadowColor='rgba(80,170,255,0.55)';
      c.shadowBlur=s.thick>1?12:4;
      c.stroke();
    });

    // Cross-thread rings per origin group
    let idx=0;
    GSIZES.forEach(cnt=>{
      const grp=strands.slice(idx,idx+cnt);idx+=cnt;
      RINGS.forEach(dist=>{
        const pts=grp.reduce((acc,s)=>{
          if(s.len>=dist) acc.push({x:s.ox+Math.cos(s.a)*dist,y:s.oy+Math.sin(s.a)*dist});
          return acc;
        },[]);
        if(pts.length<2)return;
        c.beginPath();c.moveTo(pts[0].x,pts[0].y);
        pts.slice(1).forEach(p=>c.lineTo(p.x,p.y));
        c.lineWidth=0.65;
        c.strokeStyle='rgba(120,195,255,0.30)';
        c.shadowBlur=2;c.shadowColor='rgba(80,160,255,0.3)';
        c.stroke();
      });
    });

    // Dew-drop glints at web nodes
    if(t>0.8){
      const rng=(seed)=>{let s=seed;return()=>{s=(s*16807)%2147483647;return(s-1)/2147483646;};};
      const r=rng(3131);
      for(let i=0;i<55;i++){
        const gx=r()*W,gy=r()*H;
        const ga=0.25+r()*0.55;
        c.beginPath();c.arc(gx,gy,1.4+r()*1.6,0,Math.PI*2);
        c.fillStyle=`rgba(200,235,255,${ga.toFixed(2)})`;
        c.shadowColor='rgba(120,210,255,0.9)';c.shadowBlur=7;
        c.fill();
      }
    }

    c.restore();
    c.shadowBlur=0;


    if(t<16) requestAnimationFrame(frame);
    else{
      let fo=1;
      (function fade(){
        fo-=0.022;
        if(fo>0){c.globalAlpha=fo;c.fillStyle='rgba(0,0,0,0.05)';c.fillRect(0,0,W,H);requestAnimationFrame(fade);}
        else c.clearRect(0,0,W,H);
      })();
    }
  }
  requestAnimationFrame(frame);
}

/* Remove white bg from Snoopy using flood-fill from edges */
function loadSnoopy(){
  const img = new Image();
  img.onload = () => {
    const cv = document.getElementById('snoopy-cv');
    const W = cv.width = img.naturalWidth;
    const H = cv.height = img.naturalHeight;
    const ctx = cv.getContext('2d');
    ctx.drawImage(img, 0, 0);
    const d = ctx.getImageData(0, 0, W, H);
    const px = d.data;
    const visited = new Uint8Array(W * H);
    // packed BFS queue: one Int32 per pixel (y*W+x)
    const queue = new Int32Array(W * H);
    let head = 0, tail = 0;

    function enqueue(x, y){
      if(x<0||x>=W||y<0||y>=H) return;
      const idx = y*W+x;
      if(visited[idx]) return;
      const pi = idx*4;
      if(px[pi]<200||px[pi+1]<200||px[pi+2]<200) return;
      visited[idx]=1;
      queue[tail++]=idx;
    }

    // Seed from all 4 edges
    for(let x=0;x<W;x++){ enqueue(x,0); enqueue(x,H-1); }
    for(let y=1;y<H-1;y++){ enqueue(0,y); enqueue(W-1,y); }

    while(head < tail){
      const idx = queue[head++];
      px[idx*4+3] = 0;
      const x = idx % W, y = (idx/W)|0;
      enqueue(x-1,y); enqueue(x+1,y);
      enqueue(x,y-1); enqueue(x,y+1);
    }
    ctx.putImageData(d, 0, 0);
  };
  img.src = 'images/snoopy-char.jpg';
}
loadSnoopy();

runTerminal();
</script>
